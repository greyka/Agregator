services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: agregator-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: unless-stopped

  mock-zigbee:
    build:
      context: ./infra/mock-zigbee
    container_name: agregator-mock-zigbee
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: agregator-backend
    # Host networking is required for real LAN discovery — mDNS (224.0.0.251),
    # SSDP (239.255.255.250), miIO broadcast and DHCP packet capture only work
    # when the process shares the host's network namespace.
    network_mode: host
    cap_add:
      - NET_RAW   # passive DHCP packet sniff via AF_PACKET
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: 127.0.0.1
      MQTT_PORT: 1883
      MQTT_BASE_TOPIC: zigbee2mqtt
      DATABASE_URL: sqlite+aiosqlite:////data/agregator.db
    volumes:
      - backend-data:/data
      - ./backend/app:/app/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: agregator-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    extra_hosts:
      # backend runs on host network; this lets the Vite proxy reach it
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-log:
  backend-data:
